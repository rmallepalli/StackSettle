name: Deploy (FTP – shared hosting)

# Trigger manually from the Actions tab, or adjust to run on push to main.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   FTP_HOST       — e.g. ftp.yourhost.com
#   FTP_USER       — FTP username
#   FTP_PASSWORD   — FTP password
#   VITE_API_URL   — full URL of your API, e.g. https://yourdomain.com/api

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./client/dist/
          server-dir: ./public_html/
          # Only upload changed files (git-based diff)
          dangerous-clean-slate: false
